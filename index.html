<!DOCTYPE html>
<html>
<head>
<title>India Metro Runner 3D V5</title>
<style>
body{margin:0;overflow:hidden;background:#000;font-family:Arial}
#ui{position:fixed;top:15px;left:15px;color:white;font-size:22px;z-index:5;text-shadow:2px 2px 4px #000}
.btn{position:fixed;bottom:25px;font-size:22px;padding:16px 24px;border:0;border-radius:18px;background:#ff3333;color:white;z-index:5}
#left{left:25px} #jump{left:50%;transform:translateX(-50%)} #right{right:25px}
#over,#start{position:fixed;inset:0;background:rgba(0,0,0,.72);color:white;text-align:center;padding-top:150px;font-size:32px;z-index:9}
#over{display:none}
.small{font-size:20px;color:#ffd34d}
</style>
</head>
<body>
<div id="ui">
Score: <span id="score">0</span><br>
Coins: <span id="coins">0</span><br>
Lives: <span id="lives">❤️❤️❤️</span><br>
Level: <span id="level">1</span><br>
Skin: <span id="skin">Blue Runner</span>
</div>

<div id="start">
India Metro Runner 3D<br>
<div class="small">LEFT / RIGHT = Move | SPACE = Jump</div><br>
<button onclick="startGame()" class="btn" style="position:static">START</button>
</div>

<div id="over">
GAME OVER<br>
<div class="small">Press ENTER or JUMP to restart</div>
</div>

<button id="left" class="btn">LEFT</button>
<button id="jump" class="btn">JUMP</button>
<button id="right" class="btn">RIGHT</button>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
let scene,camera,renderer,player;
let lanes=[-3,0,3], lane=0, targetX=0;
let velocityY=0,isJump=false,started=false,gameOver=false;
let score=0,coins=0,lives=3,level=1,speed=.34;
let trains=[],coinsArr=[],barricades=[],lowTrains=[],walls=[];
let skinIndex=0;
let skins=[
 {name:"Blue Runner",body:0x0066ff,head:0xffcc99},
 {name:"Red Hoodie",body:0xff2222,head:0xffcc99},
 {name:"Kurta Style",body:0xffa500,head:0xffcc99},
 {name:"Ninja",body:0x111111,head:0xd9b38c}
];

init(); animate();

function startGame(){started=true;document.getElementById("start").style.display="none"}

function init(){
 scene=new THREE.Scene();
 scene.background=new THREE.Color(0x87ceeb);

 camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,.1,1000);
 camera.position.set(0,6,11);

 renderer=new THREE.WebGLRenderer({antialias:true});
 renderer.setSize(innerWidth,innerHeight);
 document.body.appendChild(renderer.domElement);

 scene.add(new THREE.HemisphereLight(0xffffff,0x555555,2));
 let sun=new THREE.DirectionalLight(0xffffff,1.2);
 sun.position.set(5,10,8); scene.add(sun);

 world(); makePlayer();

 for(let i=0;i<7;i++) makeTrain(-35-i*45);
 for(let i=0;i<6;i++) makeBarricade(-55-i*70);
 for(let i=0;i<4;i++) makeLowTrain(-90-i*110);
 for(let i=0;i<20;i++) makeCoin(-20-i*14);

 document.onkeydown=e=>{
  if(e.code==="ArrowLeft")moveLeft();
  if(e.code==="ArrowRight")moveRight();
  if(e.code==="Space"||e.code==="ArrowUp")jumpPlayer();
  if(e.code==="Enter"&&gameOver)location.reload();
  if(e.code==="KeyC")changeSkin();
 };
 left.onclick=moveLeft; right.onclick=moveRight; jump.onclick=jumpPlayer;
 addEventListener("resize",()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
}

function box(w,h,d,color){
 let m=new THREE.MeshStandardMaterial({color});
 return new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);
}

function world(){
 let ground=box(15,.2,900,0xf0a020);
 ground.position.set(0,-.1,-330); scene.add(ground);

 for(let x of [-3,0,3]){
  let r1=box(.12,.15,900,0x333333); r1.position.set(x-.55,.08,-330); scene.add(r1);
  let r2=box(.12,.15,900,0x333333); r2.position.set(x+.55,.08,-330); scene.add(r2);
 }

 for(let i=0;i<160;i++){
  let t=box(12,.08,.35,0x7a4a22);
  t.position.set(0,.12,-i*5); scene.add(t);
 }

 for(let i=0;i<36;i++){
  makeWall(-8,-i*18,i);
  makeWall(8,-i*18,i);
 }
}

function makeWall(x,z,i){
 let g=new THREE.Group();
 let wall=box(1.2,5,12,0x8b4b2b);
 wall.position.y=2.5; g.add(wall);

 let colors=[0xff9933,0xffffff,0x138808,0xffdd00,0x00aaff];
 for(let j=0;j<3;j++){
  let art=box(.08,.8,1.8,colors[(i+j)%colors.length]);
  art.position.set(x<0?.65:-.65,2+j*.9,-3+j*3);
  g.add(art);
 }
 g.position.set(x,0,z);
 scene.add(g); walls.push(g);
}

function makePlayer(){
 player=new THREE.Group();
 updatePlayerSkin();
 player.position.set(0,0,4);
 scene.add(player);
}

function updatePlayerSkin(){
 while(player && player.children.length) player.remove(player.children[0]);
 let s=skins[skinIndex];

 let body=box(1,1.5,.55,s.body); body.position.y=1.2; player.add(body);
 let head=box(.8,.8,.8,s.head); head.position.y=2.35; player.add(head);
 let l1=box(.28,.75,.28,0x111111); l1.position.set(-.25,.35,0); player.add(l1);
 let l2=box(.28,.75,.28,0x111111); l2.position.set(.25,.35,0); player.add(l2);
 let arm1=box(.22,.9,.22,s.head); arm1.position.set(-.68,1.15,0); player.add(arm1);
 let arm2=box(.22,.9,.22,s.head); arm2.position.set(.68,1.15,0); player.add(arm2);

 document.getElementById("skin").innerText=s.name;
}

function changeSkin(){
 skinIndex=(skinIndex+1)%skins.length;
 updatePlayerSkin();
}

function makeTrain(z){
 let g=new THREE.Group();
 let body=box(2.3,2.4,9,0xe60012); body.position.y=1.3; g.add(body);
 let glass=box(1.7,.65,.15,0x111111); glass.position.set(0,1.9,4.55); g.add(glass);
 let l1=box(.35,.35,.12,0xffff00); l1.position.set(-.55,.75,4.65); g.add(l1);
 let l2=box(.35,.35,.12,0xffff00); l2.position.set(.55,.75,4.65); g.add(l2);
 g.position.set(lanes[Math.floor(Math.random()*3)],0,z);
 scene.add(g); trains.push(g);
}

function makeBarricade(z){
 let g=new THREE.Group();
 let base=box(2,.8,.35,0xff6600); base.position.y=.55; g.add(base);
 let stripe=box(2.05,.18,.38,0xffffff); stripe.position.y=.55; g.add(stripe);
 g.position.set(lanes[Math.floor(Math.random()*3)],0,z);
 scene.add(g); barricades.push(g);
}

function makeLowTrain(z){
 let g=new THREE.Group();
 let body=box(2.4,1,7,0x00aa66); body.position.y=.55; g.add(body);
 let top=box(2,.25,6.5,0xffffff); top.position.y=1.2; g.add(top);
 g.position.set(lanes[Math.floor(Math.random()*3)],0,z);
 scene.add(g); lowTrains.push(g);
}

function makeCoin(z){
 let c=new THREE.Mesh(
  new THREE.TorusGeometry(.35,.12,12,30),
  new THREE.MeshStandardMaterial({color:0xffd000})
 );
 c.position.set(lanes[Math.floor(Math.random()*3)],1.6,z);
 c.rotation.x=Math.PI/2;
 scene.add(c); coinsArr.push(c);
}

function moveLeft(){if(!started||gameOver)return;if(lane>-1){lane--;targetX=lanes[lane+1]}}
function moveRight(){if(!started||gameOver)return;if(lane<1){lane++;targetX=lanes[lane+1]}}
function jumpPlayer(){if(gameOver){location.reload();return} if(!started)return; if(!isJump){velocityY=.34;isJump=true}}

function hit(obj,dist,yLimit=1.2){
 return Math.abs(player.position.x-obj.position.x)<1.55 &&
        Math.abs(player.position.z-obj.position.z)<dist &&
        player.position.y<yLimit;
}

function resetObj(o,min=-260,max=100){
 o.position.z=min-Math.random()*max;
 o.position.x=lanes[Math.floor(Math.random()*3)];
}

function update(){
 if(!started||gameOver)return;

 score++;
 level=Math.floor(score/700)+1;
 speed=.34+level*.04;

 player.position.x+=(targetX-player.position.x)*.18;

 velocityY-=.014;
 player.position.y+=velocityY;
 if(player.position.y<=0){player.position.y=0;velocityY=0;isJump=false}

 let run=Math.sin(Date.now()/90)*.25;
 player.rotation.z=run*.15;
 if(player.children[2]) player.children[2].rotation.x=run;
 if(player.children[3]) player.children[3].rotation.x=-run;
 if(player.children[4]) player.children[4].rotation.x=-run;
 if(player.children[5]) player.children[5].rotation.x=run;

 for(let o of [...trains,...barricades,...lowTrains]){
  o.position.z+=speed;
  if(o.position.z>11) resetObj(o);
 }

 for(let tr of trains){
  if(hit(tr,4.2,.9)){
   damage(); resetObj(tr);
  }
 }

 for(let b of barricades){
  if(hit(b,1.5,1.3)){
   damage(); resetObj(b);
  }
 }

 for(let lt of lowTrains){
  if(hit(lt,3.3,.7)){
   damage(); resetObj(lt);
  }
 }

 for(let c of coinsArr){
  c.position.z+=speed;
  c.rotation.z+=.18;
  if(c.position.z>9) resetObj(c,-220,80);
  if(Math.abs(player.position.x-c.position.x)<1 && Math.abs(player.position.z-c.position.z)<1.3 && player.position.y<2.2){
   coins++; resetObj(c,-220,80);
  }
 }

 camera.position.x=player.position.x*.45;
 camera.position.y=5.2+player.position.y*.25;
 camera.position.z=10;
 camera.lookAt(player.position.x,1.8,-12);

 ui();
}

function damage(){
 lives--;
 document.getElementById("lives").innerText="❤️".repeat(lives);
 if(lives<=0){
  gameOver=true;
  document.getElementById("over").style.display="block";
 }
}

function ui(){
 document.getElementById("score").innerText=Math.floor(score/10);
 document.getElementById("coins").innerText=coins;
 document.getElementById("level").innerText=level;
}

function animate(){
 requestAnimationFrame(animate);
 update();
 renderer.render(scene,camera);
}
</script>
</body>
</html>
