<!DOCTYPE html>
<html>
<head>
<title>Subway Devil Runner</title>
<style>
body{margin:0;background:#111;overflow:hidden;font-family:Arial}
canvas{display:block;margin:auto;background:linear-gradient(#202040,#111)}
.btn{position:fixed;bottom:25px;font-size:22px;padding:16px 22px;border:0;border-radius:18px;background:#ff3333;color:#fff}
#leftBtn{left:25px}
#jumpBtn{left:50%;transform:translateX(-50%)}
#rightBtn{right:25px}
</style>
</head>
<body>
<canvas id="game" width="900" height="500"></canvas>
<button id="leftBtn" class="btn">LEFT</button>
<button id="jumpBtn" class="btn">JUMP</button>
<button id="rightBtn" class="btn">RIGHT</button>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const lanes=[280,450,620];
let lane=1;
let player={x:lanes[lane],y:380,w:45,h:60,dy:0,jump:false};
let obstacle={lane:Math.floor(Math.random()*3),y:-120,w:80,h:90,speed:5};
let coin={lane:Math.floor(Math.random()*3),y:-300,r:16,speed:5};
let score=0,coins=0,level=1,gameOver=false;
let highScore=localStorage.getItem("highScore")||0;

function moveLeft(){if(lane>0&&!gameOver){lane--;player.x=lanes[lane];}}
function moveRight(){if(lane<2&&!gameOver){lane++;player.x=lanes[lane];}}
function jump(){if(!player.jump&&!gameOver){player.dy=-15;player.jump=true;} if(gameOver)location.reload();}

document.addEventListener("keydown",e=>{
 if(e.code==="ArrowLeft")moveLeft();
 if(e.code==="ArrowRight")moveRight();
 if(e.code==="Space"||e.code==="ArrowUp")jump();
 if(e.code==="Enter"&&gameOver)location.reload();
});

leftBtn.onclick=moveLeft;
rightBtn.onclick=moveRight;
jumpBtn.onclick=jump;

function hit(a,b){
 return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;
}

function update(){
 if(gameOver)return;

 level=Math.floor(score/10)+1;
 obstacle.speed=5+level*0.8;
 coin.speed=5+level*0.6;

 player.dy+=0.8;
 player.y+=player.dy;
 if(player.y>=380){player.y=380;player.dy=0;player.jump=false;}

 obstacle.y+=obstacle.speed;
 coin.y+=coin.speed;

 if(obstacle.y>550){
  obstacle.y=-100;
  obstacle.lane=Math.floor(Math.random()*3);
  score++;
 }

 if(coin.y>550){
  coin.y=-250-Math.random()*300;
  coin.lane=Math.floor(Math.random()*3);
 }

 let obsBox={x:lanes[obstacle.lane]-40,y:obstacle.y,w:80,h:90};
 let coinBox={x:lanes[coin.lane]-16,y:coin.y-16,w:32,h:32};

 if(hit(player,coinBox)){
  coins++;
  score+=2;
  coin.y=-250-Math.random()*300;
  coin.lane=Math.floor(Math.random()*3);
 }

 if(hit(player,obsBox)){
  gameOver=true;
  if(score>highScore){
    highScore=score;
    localStorage.setItem("highScore",highScore);
  }
 }
}

function drawRoad(){
 ctx.fillStyle="#222";
 ctx.beginPath();
 ctx.moveTo(250,500);
 ctx.lineTo(650,500);
 ctx.lineTo(560,0);
 ctx.lineTo(340,0);
 ctx.closePath();
 ctx.fill();

 ctx.strokeStyle="#fff";
 ctx.lineWidth=4;
 ctx.setLineDash([25,25]);
 ctx.beginPath();
 ctx.moveTo(380,500);
 ctx.lineTo(420,0);
 ctx.stroke();
 ctx.beginPath();
 ctx.moveTo(520,500);
 ctx.lineTo(480,0);
 ctx.stroke();
 ctx.setLineDash([]);
}

function drawPlayer(){
 ctx.fillStyle="#00d66b";
 ctx.fillRect(player.x-22,player.y,player.w,player.h);
 ctx.fillStyle="#fff";
 ctx.fillRect(player.x-12,player.y+15,8,8);
 ctx.fillRect(player.x+6,player.y+15,8,8);
 ctx.fillStyle="#000";
 ctx.fillRect(player.x-10,player.y+18,3,3);
 ctx.fillRect(player.x+8,player.y+18,3,3);
}

function drawObstacle(){
 let x=lanes[obstacle.lane]-40;
 ctx.fillStyle="#444";
 ctx.fillRect(x,obstacle.y,80,90);
 ctx.fillStyle="#ff3333";
 ctx.fillRect(x+10,obstacle.y+15,60,20);
 ctx.fillStyle="#999";
 ctx.fillRect(x+12,obstacle.y+50,18,25);
 ctx.fillRect(x+50,obstacle.y+50,18,25);
}

function drawCoin(){
 ctx.fillStyle="#ffb000";
 ctx.beginPath();
 ctx.arc(lanes[coin.lane],coin.y,coin.r,0,Math.PI*2);
 ctx.fill();
}

function draw(){
 ctx.clearRect(0,0,900,500);
 drawRoad();
 drawCoin();
 drawObstacle();
 drawPlayer();

 ctx.fillStyle="#fff";
 ctx.font="22px Arial";
 ctx.fillText("Score: "+score,20,35);
 ctx.fillText("Coins: "+coins,20,65);
 ctx.fillText("Level: "+level,20,95);
 ctx.fillText("High Score: "+highScore,20,125);
 ctx.fillText("← → Move | Space Jump",620,35);

 if(gameOver){
  ctx.fillStyle="rgba(0,0,0,0.75)";
  ctx.fillRect(0,0,900,500);
  ctx.fillStyle="#ff3333";
  ctx.font="46px Arial";
  ctx.fillText("GAME OVER",300,210);
  ctx.fillStyle="#fff";
  ctx.font="24px Arial";
  ctx.fillText("Score: "+score+" | Coins: "+coins,305,260);
  ctx.fillText("Press ENTER or JUMP to Restart",270,310);
 }
}

function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
