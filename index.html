<!DOCTYPE html>
<html>
<head>
<title>3D Subway Runner</title>
<style>
body{margin:0;overflow:hidden;background:#000;font-family:Arial}
#ui{position:fixed;top:15px;left:15px;color:white;font-size:22px;z-index:5}
.btn{position:fixed;bottom:25px;font-size:22px;padding:16px 24px;border:0;border-radius:18px;background:#ff3333;color:white;z-index:5}
#left{left:25px} #jump{left:50%;transform:translateX(-50%)} #right{right:25px}
#over{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);color:white;text-align:center;padding-top:180px;font-size:34px;z-index:9}
</style>
</head>
<body>
<div id="ui">
Score: <span id="score">0</span><br>
Coins: <span id="coins">0</span><br>
Lives: <span id="lives">❤️❤️❤️</span>
</div>

<div id="over">
GAME OVER<br><br>
Press ENTER or JUMP to restart
</div>

<button id="left" class="btn">LEFT</button>
<button id="jump" class="btn">JUMP</button>
<button id="right" class="btn">RIGHT</button>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
let scene,camera,renderer;
let player,playerGroup;
let lane=0,targetX=0;
let lanes=[-3,0,3];
let velocityY=0,isJump=false;
let trains=[],coinsArr=[],tracks=[];
let speed=.35,score=0,coins=0,lives=3,gameOver=false;

init();
animate();

function init(){
 scene=new THREE.Scene();
 scene.background=new THREE.Color(0x87ceeb);

 camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,.1,1000);
 camera.position.set(0,5,10);
 camera.lookAt(0,2,-10);

 renderer=new THREE.WebGLRenderer({antialias:true});
 renderer.setSize(innerWidth,innerHeight);
 document.body.appendChild(renderer.domElement);

 let light=new THREE.HemisphereLight(0xffffff,0x444444,2);
 scene.add(light);

 let sun=new THREE.DirectionalLight(0xffffff,1);
 sun.position.set(5,10,5);
 scene.add(sun);

 createWorld();
 createPlayer();

 for(let i=0;i<8;i++) createTrain(-30-i*35);
 for(let i=0;i<15;i++) createCoin(-15-i*15);

 document.addEventListener("keydown",e=>{
  if(e.code==="ArrowLeft")moveLeft();
  if(e.code==="ArrowRight")moveRight();
  if(e.code==="Space"||e.code==="ArrowUp")jumpPlayer();
  if(e.code==="Enter"&&gameOver)location.reload();
 });

 left.onclick=moveLeft;
 right.onclick=moveRight;
 jump.onclick=jumpPlayer;

 addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
 });
}

function box(w,h,d,color){
 let g=new THREE.BoxGeometry(w,h,d);
 let m=new THREE.MeshStandardMaterial({color});
 return new THREE.Mesh(g,m);
}

function createWorld(){
 let ground=box(14,.2,800,0xf2a02d);
 ground.position.set(0,-.1,-250);
 scene.add(ground);

 for(let x of [-4,0,4]){
  let rail1=box(.12,.15,800,0x555555);
  rail1.position.set(x-.45,.05,-250);
  scene.add(rail1);

  let rail2=box(.12,.15,800,0x555555);
  rail2.position.set(x+.45,.05,-250);
  scene.add(rail2);
 }

 for(let i=0;i<120;i++){
  let t=box(12,.08,.35,0x8b5a2b);
  t.position.set(0,.08,-i*5);
  scene.add(t);
 }

 for(let i=0;i<40;i++){
  let b=box(3,Math.random()*8+4,3,0x6b4b3e);
  b.position.set(-9, b.geometry.parameters.height/2, -i*18);
  scene.add(b);

  let b2=box(3,Math.random()*8+4,3,0x6b4b3e);
  b2.position.set(9, b2.geometry.parameters.height/2, -i*18);
  scene.add(b2);
 }

 let sky=box(80,30,.5,0x69cfff);
 sky.position.set(0,15,-180);
 scene.add(sky);
}

function createPlayer(){
 playerGroup=new THREE.Group();

 let body=box(1,1.4,.6,0x0066ff);
 body.position.y=1.2;
 playerGroup.add(body);

 let head=box(.8,.8,.8,0xffcc99);
 head.position.y=2.3;
 playerGroup.add(head);

 let leg1=box(.3,.8,.3,0x111111);
 leg1.position.set(-.25,.35,0);
 playerGroup.add(leg1);

 let leg2=box(.3,.8,.3,0x111111);
 leg2.position.set(.25,.35,0);
 playerGroup.add(leg2);

 playerGroup.position.set(0,0,4);
 scene.add(playerGroup);
 player=playerGroup;
}

function createTrain(z){
 let g=new THREE.Group();

 let body=box(2.2,2.2,5,0xe60012);
 body.position.y=1.2;
 g.add(body);

 let front=box(1.7,.7,.15,0x222222);
 front.position.set(0,1.7,2.55);
 g.add(front);

 let light1=box(.35,.35,.1,0xffff00);
 light1.position.set(-.55,.7,2.65);
 g.add(light1);

 let light2=box(.35,.35,.1,0xffff00);
 light2.position.set(.55,.7,2.65);
 g.add(light2);

 g.position.set(lanes[Math.floor(Math.random()*3)],0,z);
 scene.add(g);
 trains.push(g);
}

function createCoin(z){
 let geo=new THREE.TorusGeometry(.35,.12,12,30);
 let mat=new THREE.MeshStandardMaterial({color:0xffd000});
 let c=new THREE.Mesh(geo,mat);
 c.position.set(lanes[Math.floor(Math.random()*3)],1.5,z);
 c.rotation.x=Math.PI/2;
 scene.add(c);
 coinsArr.push(c);
}

function moveLeft(){
 if(gameOver)return;
 if(lane>-1){lane--;targetX=lanes[lane+1];}
}

function moveRight(){
 if(gameOver)return;
 if(lane<1){lane++;targetX=lanes[lane+1];}
}

function jumpPlayer(){
 if(gameOver){location.reload();return;}
 if(!isJump){
  velocityY=.28;
  isJump=true;
 }
}

function hit(a,b,dist){
 return Math.abs(a.position.x-b.position.x)<1.5 && Math.abs(a.position.z-b.position.z)<dist && a.position.y<1.2;
}

function update(){
 if(gameOver)return;

 score++;
 speed+=0.00005;

 player.position.x+=(targetX-player.position.x)*.15;

 velocityY-=.012;
 player.position.y+=velocityY;
 if(player.position.y<=0){
  player.position.y=0;
  velocityY=0;
  isJump=false;
 }

 player.rotation.z=Math.sin(Date.now()/120)*.05;

 for(let tr of trains){
  tr.position.z+=speed;
  if(tr.position.z>10){
   tr.position.z=-260-Math.random()*80;
   tr.position.x=lanes[Math.floor(Math.random()*3)];
  }
  if(hit(player,tr,2.5)){
   lives--;
   document.getElementById("lives").innerText="❤️".repeat(lives);
   tr.position.z=-230;
   if(lives<=0){
    gameOver=true;
    document.getElementById("over").style.display="block";
   }
  }
 }

 for(let c of coinsArr){
  c.position.z+=speed;
  c.rotation.z+=.15;
  if(c.position.z>8){
   c.position.z=-220-Math.random()*100;
   c.position.x=lanes[Math.floor(Math.random()*3)];
  }
  if(Math.abs(player.position.x-c.position.x)<1 && Math.abs(player.position.z-c.position.z)<1.2 && player.position.y<2){
   coins++;
   c.position.z=-220-Math.random()*80;
   c.position.x=lanes[Math.floor(Math.random()*3)];
  }
 }

 camera.position.x=player.position.x*.35;
 camera.position.y=5+player.position.y*.25;
 camera.position.z=10;
 camera.lookAt(player.position.x,1.5,-8);

 document.getElementById("score").innerText=Math.floor(score/10);
 document.getElementById("coins").innerText=coins;
}

function animate(){
 requestAnimationFrame(animate);
 update();
 renderer.render(scene,camera);
}
</script>
</body>
</html>
